version: "3.8"

services:
  web:
    image: nginx:alpine
    container_name: navigation-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M  # Limite à 256 Mo de RAM

  jupyter:
    image: jupyter/minimal-notebook
    container_name: jupyter_lab_PMR
    user: root
    restart: unless-stopped
    volumes:
      - ./app:/home/jovyan/work
    ports:
      - "8899:8888"
    environment:
      - JUPYTER_TOKEN=votre_token_securise
    command: >
      start-notebook.sh
      --NotebookApp.token='votre_token_securise'
      --NotebookApp.password=''
      --NotebookApp.allow_root=True
      --ip=0.0.0.0
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M  # Limite à 512 Mo de RAM

networks:
  app-network:
    driver: bridge
