<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation par Temps - Salle Abbé Lehmann</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #333;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #45a049;
        }
        #timer {
            font-size: 24px;
            margin: 20px 0;
        }
        #position {
            font-size: 20px;
            margin: 20px 0;
        }
        #instruction-container {
            margin: 30px 0;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fleche-container {
            font-size: 150px;
            color: #4CAF50;
        }
        #obstacle {
            font-weight: bold;
            margin: 10px 0;
            font-size: 16px;
            color: #d32f2f;
        }
        .etape {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Navigation par Temps</h1>
        <h2>Salle Abbé Lehmann → Salle de Techno</h2>

        <button id="demarrer">Démarrer le trajet</button>
        <button id="arret" disabled>Arrêter</button>

        <div id="timer">Temps écoulé : 0 min 0 s</div>
        <div id="position">Position estimée : Départ</div>
        <div class="etape" id="etape">Étape : Prêt à démarrer</div>
        <div id="obstacle"></div>

        <div id="instruction-container">
            <div id="instruction" class="fleche-container">↑</div>
        </div>
    </div>

    <script>
        // Base de données des itinéraires et segments (uniquement Salle Abbé Lehmann → Salle de Techno)
        const itineraireData = {
            "salle-abbe-lehmann": [
                { depart: "Salle Abbé Lehmann", arrivee: "Tourner à droite", temps: 1.0, instruction: "Aller tout droit", obstacle: "Bouches d'égouts, portes" },
                { depart: "Tourner à droite", arrivee: "Aller tout droit", temps: 0.2, instruction: "Tourner à droite", obstacle: "" },
                 { depart: "Tourner à droite", arrivee: "Aller tout droit", temps: 0.2, instruction: "Aller tout droit", obstacle: "Ne pas serrer à droite car il y a des bancs" },
                { depart: "Aller tout droit", arrivee: "Salle de Techno", temps: 0.333, instruction: "Suivre le chemin fluorescent", obstacle: "Suivre le chemin fluorescent" },
                { depart: "Salle de Techno", arrivee: "Fin", temps: 0.333, instruction: "Aller tout droit", obstacle: "Gouttière" }
            ]
        };

        // Variables globales
        let intervalId;
        let tempsEcoule = 0;
        let itineraireSelectionne = [];
        let tempsCumules = {};
        let positionPrecedente = null;
        let instructionPrecedente = null;
        let obstaclePrecedent = null;
        let etapePrecedente = null;

        // Fonction pour démarrer le chronomètre
        document.getElementById("demarrer").addEventListener("click", function() {
            const idItineraire = "salle-abbe-lehmann";

            itineraireSelectionne = itineraireData[idItineraire];
            positionPrecedente = itineraireSelectionne[0].depart;
            instructionPrecedente = itineraireSelectionne[0].instruction;
            obstaclePrecedent = itineraireSelectionne[0].obstacle;
            calculerTempsCumules();
            document.getElementById("demarrer").disabled = true;
            document.getElementById("arret").disabled = false;
            document.getElementById("position").textContent = `Position estimée : ${positionPrecedente}`;
            document.getElementById("etape").textContent = `Étape : 1`;
            document.getElementById("obstacle").textContent = obstaclePrecedent ? `Attention : ${obstaclePrecedent}` : '';
            mettreAJourFleche(instructionPrecedente);
            intervalId = setInterval(mettreAJourTimer, 1000);
        });

        // Fonction pour arrêter le chronomètre
        document.getElementById("arret").addEventListener("click", function() {
            clearInterval(intervalId);
            document.getElementById("demarrer").disabled = false;
            document.getElementById("arret").disabled = true;
        });

        // Fonction pour calculer les temps cumulés
        function calculerTempsCumules() {
            tempsCumules = {};
            let tempsTotal = 0;
            itineraireSelectionne.forEach(segment => {
                tempsTotal += segment.temps;
                tempsCumules[segment.arrivee] = tempsTotal;
            });
        }

        // Fonction pour mettre à jour la flèche directionnelle
        function mettreAJourFleche(instruction) {
            let fleche;
            if (instruction === "Aller tout droit") {
                fleche = "↑";
            } else if (instruction === "Tourner à droite") {
                fleche = "→";
            } else if (instruction === "Suivre le chemin fluorescent") {
                fleche = "↓"; // Flèche vers le bas pour indiquer de regarder vers le sol
            } else {
                fleche = "✓";
            }
            document.getElementById("instruction").textContent = fleche;
        }

        // Fonction pour mettre à jour le timer et la position
        function mettreAJourTimer() {
            tempsEcoule += 1;
            const minutes = Math.floor(tempsEcoule / 60);
            const secondes = tempsEcoule % 60;
            document.getElementById("timer").textContent = `Temps écoulé : ${minutes} min ${secondes} s`;

            // Estimer la position, l'instruction et l'étape
            let positionEstimee = itineraireSelectionne[0].depart;
            let instructionEstimee = itineraireSelectionne[0].instruction;
            let obstacleEstime = itineraireSelectionne[0].obstacle;
            let etapeEstimee = 1;

            let tempsCumule = 0;
            for (let i = 0; i < itineraireSelectionne.length; i++) {
                const segment = itineraireSelectionne[i];
                tempsCumule += segment.temps * 60; // Convertir en secondes
                if (tempsEcoule <= tempsCumule) {
                    positionEstimee = segment.depart;
                    instructionEstimee = segment.instruction;
                    obstacleEstime = segment.obstacle;
                    etapeEstimee = i + 1;
                    break;
                }
            }

            // Afficher la position, l'instruction, l'étape et les obstacles si elles ont changé
            if (positionEstimee !== positionPrecedente || instructionEstimee !== instructionPrecedente || obstacleEstime !== obstaclePrecedent || etapeEstimee !== etapePrecedente) {
                document.getElementById("position").textContent = `Position estimée : ${positionEstimee}`;
                document.getElementById("etape").textContent = `Étape : ${etapeEstimee}`;
                document.getElementById("obstacle").textContent = obstacleEstime ? `Attention : ${obstacleEstime}` : '';
                mettreAJourFleche(instructionEstimee);
                positionPrecedente = positionEstimee;
                instructionPrecedente = instructionEstimee;
                obstaclePrecedent = obstacleEstime;
                etapePrecedente = etapeEstimee;
            }
        }
    </script>
</body>
</html>
